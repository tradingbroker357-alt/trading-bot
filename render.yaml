
services:
  - type: worker
    name: collector
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python collector/main.py
    envVars:
      - key: IQ_EMAIL
        sync: false
      - key: IQ_PASSWORD
        sync: false

  - type: worker
    name: agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python agent/train.py
    envVars:
      - key: IQ_EMAIL
        sync: false
      - key: IQ_PASSWORD
        sync: false

  - type: web
    name: dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
